# Local dev gateway — no Docker DNS, listens on 8080, proxies to localhost services
worker_processes 1;
error_log /tmp/bt-gateway-error.log warn;
pid /tmp/bt-gateway.pid;

events {
  worker_connections 256;
}

http {
  access_log /tmp/bt-gateway-access.log;

  server {
    listen 8080;
    server_name _;

    client_max_body_size 10m;

    # Strip CORS headers the backend already sets — nginx is the single source of truth
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Max-Age;

    # CORS — allow everything for local dev
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-Id" always;
    add_header Access-Control-Expose-Headers "X-Request-Id" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    # Auth service (port 3001)
    location /api/auth/ {
      rewrite ^/api/auth/(.*) /auth/$1 break;
      proxy_pass http://127.0.0.1:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/kyc/ {
      rewrite ^/api/kyc/(.*) /kyc/$1 break;
      proxy_pass http://127.0.0.1:3001;
      proxy_set_header Host $host;
    }
    location /api/onboarding/ {
      rewrite ^/api/onboarding/(.*) /onboarding/$1 break;
      proxy_pass http://127.0.0.1:3001;
      proxy_set_header Host $host;
    }

    # Booking service (port 3002)
    location /api/bookings/ {
      rewrite ^/api/bookings/(.*) /bookings/$1 break;
      proxy_pass http://127.0.0.1:3002;
      proxy_set_header Host $host;
    }
    location /api/quotes/ {
      rewrite ^/api/quotes/(.*) /quotes/$1 break;
      proxy_pass http://127.0.0.1:3002;
      proxy_set_header Host $host;
    }
    location /api/location/ {
      rewrite ^/api/location/(.*) /location/$1 break;
      proxy_pass http://127.0.0.1:3002;
      proxy_set_header Host $host;
    }

    # Tracking service (port 3006)
    location /api/tracking/ {
      rewrite ^/api/tracking/(.*) /tracking/$1 break;
      proxy_pass http://127.0.0.1:3006;
      proxy_set_header Host $host;
    }

    # Pricing (3003), Payments (3004), Cargo (3005)
    location /api/pricing/ {
      rewrite ^/api/pricing/(.*) /pricing/$1 break;
      proxy_pass http://127.0.0.1:3003;
      proxy_set_header Host $host;
    }
    location /api/payments/ {
      rewrite ^/api/payments/(.*) /payments/$1 break;
      proxy_pass http://127.0.0.1:3004;
      proxy_set_header Host $host;
    }
    location /api/cargo/ {
      rewrite ^/api/cargo/(.*) /cargo/$1 break;
      proxy_pass http://127.0.0.1:3005;
      proxy_set_header Host $host;
    }

    location = /health {
      access_log off;
      default_type application/json;
      return 200 '{"status":"ok","service":"bt-gateway-local"}\n';
    }

    location / {
      default_type application/json;
      return 404 '{"error":"not_found","message":"No route matched this path"}\n';
    }
  }
}
